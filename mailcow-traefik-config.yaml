apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    ports:
      smtp:
        port: 25
        expose:
          default: true
        exposedPort: 25
        protocol: TCP
      smtps:
        port: 465
        expose:
          default: true
        exposedPort: 465
        protocol: TCP
      submission:
        port: 587
        expose:
          default: true
        exposedPort: 587
        protocol: TCP
      imap:
        port: 143
        expose:
          default: true
        exposedPort: 143
        protocol: TCP
      imaps:
        port: 993
        expose:
          default: true
        exposedPort: 993
        protocol: TCP
