apiVersion: v1
kind: Service
metadata:
  name: roundcube-service
  namespace: mailcow
  labels:
    app: roundcube
spec:
  type: ClusterIP
  selector:
    app: roundcube
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube
  namespace: mailcow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roundcube
  template:
    metadata:
      labels:
        app: roundcube
    spec:
      containers:
      - name: roundcube
        image: roundcube/roundcubemail:latest-apache
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        env:
        - name: ROUNDCUBEMAIL_DEFAULT_HOST
          value: dms-service.mailcow.svc.cluster.local
        - name: ROUNDCUBEMAIL_IMAP_PORT
          value: "143"
        - name: ROUNDCUBEMAIL_IMAP_SECURE
          value: "tls"
        - name: ROUNDCUBEMAIL_SMTP_PORT
          value: "587"
        - name: ROUNDCUBEMAIL_SMTP_SECURE
          value: "tls"
        - name: ROUNDCUBEMAIL_SMTP_USER
          value: "%u"
        - name: ROUNDCUBEMAIL_SMTP_PASS
          value: "%p"
        - name: ROUNDCUBEMAIL_SKIN
          value: larry
        - name: ROUNDCUBEMAIL_PLUGINS
          value: archive,zipdownload
        - name: ROUNDCUBEMAIL_DB_DRIVER
          value: sqlite
        - name: ROUNDCUBEMAIL_DB_HOST
          value: sqlite
        volumeMounts:
        - name: roundcube-db
          mountPath: /var/roundcube/db
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: roundcube-db
        persistentVolumeClaim:
          claimName: roundcube-db
