apiVersion: v1
kind: Service
metadata:
  name: docker-registry
  namespace: apps
spec:
  clusterIP: 10.43.115.133
  clusterIPs:
    - 10.43.115.133
  internalTrafficPolicy: Cluster
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  ports:
    - port: 5000
      protocol: TCP
      targetPort: 5000
  selector:
    app: docker-registry
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    field.cattle.io/publicEndpoints: '[{"addresses":["192.168.0.134","192.168.0.48"],"port":5000,"protocol":"TCP","serviceName":"apps:docker-registry-lb","allNodes":false}]'
  name: docker-registry-lb
  namespace: apps
spec:
  allocateLoadBalancerNodePorts: true
  clusterIP: 10.43.191.120
  clusterIPs:
    - 10.43.191.120
  externalTrafficPolicy: Cluster
  internalTrafficPolicy: Cluster
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  ports:
    - nodePort: 32762
      port: 5000
      protocol: TCP
      targetPort: 5000
  selector:
    app: docker-registry
  sessionAffinity: None
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    deployment.kubernetes.io/revision: '4'
    field.cattle.io/publicEndpoints: '[{"addresses":["192.168.0.134","192.168.0.48"],"port":5000,"protocol":"TCP","serviceName":"apps:docker-registry-lb","allNodes":false}]'
  name: docker-registry
  namespace: apps
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: docker-registry
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: docker-registry
    spec:
      containers:
        - env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: 'true'
            - name: REGISTRY_HTTP_TLS_CERTIFICATE
              value: /certs/tls.crt
            - name: REGISTRY_HTTP_TLS_KEY
              value: /certs/tls.key
          image: registry:2
          imagePullPolicy: IfNotPresent
          name: registry
          ports:
            - containerPort: 5000
              protocol: TCP
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /var/lib/registry
              name: registry-storage
            - mountPath: /certs
              name: registry-tls
              readOnly: true
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
        - name: registry-storage
          persistentVolumeClaim:
            claimName: registry-storage
        - name: registry-tls
          secret:
            defaultMode: 420
            secretName: registry-tls
