apiVersion: v1
kind: Service
metadata:
  name: logiplan-webterminal
  namespace: apps
spec:
  ports:
    - port: 80
      protocol: TCP
      targetPort: 80
  selector:
    app: logiplan-webterminal
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logiplan-webterminal
  namespace: apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: logiplan-webterminal
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: logiplan-webterminal
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: webterminal
          image: ghcr.io/acaburaz/logiplan-webterminal:34
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 5
            successThreshold: 1
            httpGet:
              path: /
              port: 80
            timeoutSeconds: 1
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 20
            periodSeconds: 10
            successThreshold: 1
            httpGet:
              path: /
              port: 80
            timeoutSeconds: 1
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webterminal-ingress
  namespace: apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: testterminal-preview.logiplan.se
      http:
        paths:
          - backend:
              service:
                name: logiplan-webterminal
                port:
                  number: 80
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - testterminal-preview.logiplan.se
      secretName: testterminal-preview-tls
