apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: jenkins
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      nodeSelector:
        kubernetes.io/hostname: m710q
      serviceAccountName: jenkins
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        supplementalGroups: [996]
      initContainers:
        - name: init-jenkins-home
          image: busybox
          command:
            - sh
            - -c
            - |
              chown -R 1000:1000 /var/jenkins_home
              mkdir -p /var/jenkins_home/bin
              if [ ! -f /var/jenkins_home/bin/docker ]; then
                wget -qO /tmp/docker.tgz https://download.docker.com/linux/static/stable/x86_64/docker-27.3.1.tgz
                tar -xz -C /tmp -f /tmp/docker.tgz docker/docker
                mv /tmp/docker/docker /var/jenkins_home/bin/docker
                chmod +x /var/jenkins_home/bin/docker
                echo "Docker CLI installed"
              fi
              chown -R 1000:1000 /var/jenkins_home/bin
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: jenkins-data
              mountPath: /var/jenkins_home
        - name: install-plugins
          image: jenkins/jenkins:lts
          command:
            - sh
            - -c
            - |
              if [ ! -f /var/jenkins_home/.plugins-installed ]; then
                mkdir -p /var/jenkins_home/plugins
                jenkins-plugin-cli --plugin-file /usr/share/jenkins/plugins.txt -d /var/jenkins_home/plugins
                touch /var/jenkins_home/.plugins-installed
                echo "Plugins installed"
              else
                echo "Plugins already installed, skipping"
              fi
          volumeMounts:
            - name: jenkins-data
              mountPath: /var/jenkins_home
            - name: plugins-config
              mountPath: /usr/share/jenkins/plugins.txt
              subPath: plugins.txt
      containers:
        - name: jenkins
          image: jenkins/jenkins:lts
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 50000
              name: agent
          env:
            - name: JAVA_OPTS
              value: "-Djenkins.install.runSetupWizard=false"
            - name: CASC_JENKINS_CONFIG
              value: /var/jenkins_home/casc.yaml
            # Credential values injected from secret
            - name: GHCR_USER
              valueFrom:
                secretKeyRef:
                  name: jenkins-credentials
                  key: GHCR_USER
            - name: GHCR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: jenkins-credentials
                  key: GHCR_TOKEN
            - name: GITHUB_USER
              valueFrom:
                secretKeyRef:
                  name: jenkins-credentials
                  key: GITHUB_USER
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: jenkins-credentials
                  key: GITHUB_TOKEN
            - name: MYNFORKORT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: jenkins-credentials
                  key: MYNFORKORT_TOKEN
            - name: LOGIPLAN_USER
              valueFrom:
                secretKeyRef:
                  name: jenkins-credentials
                  key: LOGIPLAN_USER
            - name: LOGIPLAN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: jenkins-credentials
                  key: LOGIPLAN_TOKEN
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: jenkins-data
              mountPath: /var/jenkins_home
            - name: jenkins-data
              mountPath: /usr/local/bin/docker
              subPath: bin/docker
            - name: casc-config
              mountPath: /var/jenkins_home/casc.yaml
              subPath: casc.yaml
            - name: docker-sock
              mountPath: /var/run/docker.sock
          readinessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: jenkins-data
          persistentVolumeClaim:
            claimName: jenkins-data
        - name: casc-config
          configMap:
            name: jenkins-casc
        - name: plugins-config
          configMap:
            name: jenkins-plugins
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
