apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-casc
  namespace: jenkins
data:
  casc.yaml: |
    jenkins:
      systemMessage: "Jenkins — k3s GitOps CI/CD"
      numExecutors: 1
      securityRealm:
        local:
          allowsSignup: false
          users:
            - id: "admin"
              password: "admin"
      authorizationStrategy:
        loggedInUsersCanDoAnything:
          allowAnonymousRead: false

    credentials:
      system:
        domainCredentials:
          - credentials:
              - usernamePassword:
                  scope: GLOBAL
                  id: "ghcr-credentials"
                  description: "GitHub Container Registry (ghcr.io)"
                  username: "${GHCR_USER}"
                  password: "${GHCR_TOKEN}"
              - usernamePassword:
                  scope: GLOBAL
                  id: "github-credentials"
                  description: "GitHub — k3s GitOps repo"
                  username: "${GITHUB_USER}"
                  password: "${GITHUB_TOKEN}"
              - usernamePassword:
                  scope: GLOBAL
                  id: "mynforkort-scm"
                  description: "GitHub — mynforkort source repo"
                  username: "${GITHUB_USER}"
                  password: "${MYNFORKORT_TOKEN}"
              - usernamePassword:
                  scope: GLOBAL
                  id: "logiplan-scm"
                  description: "Azure DevOps — LogiPlanWebApp source repo"
                  username: "${LOGIPLAN_USER}"
                  password: "${LOGIPLAN_TOKEN}"

    jobs:
      - script: |
          pipelineJob('mynforkort-build') {
            description('Build and deploy mynforkort on new commits')
            logRotator { numToKeep(5) }
            triggers { scm('H/2 * * * *') }
            definition {
              cpsScm {
                scm {
                  git {
                    remote {
                      url('https://github.com/acaburaz/mynforkort')
                      credentials('mynforkort-scm')
                    }
                    branch('*/main')
                  }
                }
                scriptPath('Jenkinsfile')
                lightweight(true)
              }
            }
          }
      - script: |
          pipelineJob('logiplan-api-build') {
            description('Build and deploy logiplan-api on new commits')
            logRotator { numToKeep(5) }
            triggers { scm('H/2 * * * *') }
            definition {
              cpsScm {
                scm {
                  git {
                    remote {
                      url('https://logiplan@dev.azure.com/logiplan/LogiPlanWebApp/_git/LogiPlanWebApp')
                      credentials('logiplan-scm')
                    }
                    branch('*/develop')
                  }
                }
                scriptPath('Jenkinsfile')
                lightweight(true)
              }
            }
          }
      - script: |
          pipelineJob('logiplan-terminal-build') {
            description('Build and deploy LogiPlanWebTerminal on new commits')
            logRotator { numToKeep(5) }
            triggers { scm('H/2 * * * *') }
            definition {
              cpsScm {
                scm {
                  git {
                    remote {
                      url('https://logiplan@dev.azure.com/logiplan/LogiPlanWebApp/_git/LogiPlanWebTerminal')
                      credentials('logiplan-scm')
                    }
                    branch('*/develop')
                  }
                }
                scriptPath('Jenkinsfile')
                lightweight(true)
              }
            }
          }
      - script: |
          pipelineJob('logiplan-ui-build') {
            description('Build and deploy LogiPlanWebUI on new commits')
            logRotator { numToKeep(5) }
            triggers { scm('H/2 * * * *') }
            definition {
              cpsScm {
                scm {
                  git {
                    remote {
                      url('https://logiplan@dev.azure.com/logiplan/LogiPlanWebApp/_git/LogiPlanWebUI')
                      credentials('logiplan-scm')
                    }
                    branch('*/develop')
                  }
                }
                scriptPath('Jenkinsfile')
                lightweight(true)
              }
            }
          }

    unclassified:
      location:
        url: "http://192.168.0.134:32743/"
