apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-casc
  namespace: jenkins
data:
  casc.yaml: |
    jenkins:
      systemMessage: "Jenkins — k3s GitOps CI/CD"
      numExecutors: 4
      securityRealm:
        local:
          allowsSignup: false
          users:
            - id: "admin"
              password: "admin"
      authorizationStrategy:
        loggedInUsersCanDoAnything:
          allowAnonymousRead: false

    credentials:
      system:
        domainCredentials:
          - credentials:
              - usernamePassword:
                  scope: GLOBAL
                  id: "ghcr-credentials"
                  description: "GitHub Container Registry (ghcr.io)"
                  username: "${GHCR_USER}"
                  password: "${GHCR_TOKEN}"
              - usernamePassword:
                  scope: GLOBAL
                  id: "github-credentials"
                  description: "GitHub — k3s GitOps repo"
                  username: "${GITHUB_USER}"
                  password: "${GITHUB_TOKEN}"
              - usernamePassword:
                  scope: GLOBAL
                  id: "argocd-credentials"
                  description: "ArgoCD admin"
                  username: "${ARGOCD_USER}"
                  password: "${ARGOCD_PASS}"

    unclassified:
      location:
        url: "http://192.168.0.134:32743/"
