apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-casc
  namespace: jenkins
data:
  casc.yaml: |
    jenkins:
      systemMessage: "Jenkins — k3s GitOps CI/CD"
      numExecutors: 4
      securityRealm:
        local:
          allowsSignup: false
          users:
            - id: "admin"
              password: "admin"
      authorizationStrategy:
        loggedInUsersCanDoAnything:
          allowAnonymousRead: false

    credentials:
      system:
        domainCredentials:
          - credentials:
              - usernamePassword:
                  scope: GLOBAL
                  id: "ghcr-credentials"
                  description: "GitHub Container Registry (ghcr.io)"
                  username: "${GHCR_USER}"
                  password: "${GHCR_TOKEN}"
              - usernamePassword:
                  scope: GLOBAL
                  id: "github-credentials"
                  description: "GitHub — k3s GitOps repo"
                  username: "${GITHUB_USER}"
                  password: "${GITHUB_TOKEN}"
              - usernamePassword:
                  scope: GLOBAL
                  id: "mynforkort-scm"
                  description: "GitHub — mynforkort source repo"
                  username: "${GITHUB_USER}"
                  password: "${MYNFORKORT_TOKEN}"
              - usernamePassword:
                  scope: GLOBAL
                  id: "logiplan-scm"
                  description: "Azure DevOps — LogiPlanWebApp source repo"
                  username: "${LOGIPLAN_USER}"
                  password: "${LOGIPLAN_TOKEN}"
              - usernamePassword:
                  scope: GLOBAL
                  id: "argocd-credentials"
                  description: "ArgoCD admin"
                  username: "${ARGOCD_USER}"
                  password: "${ARGOCD_PASS}"

    jobs:
      - script: |
          pipelineJob('mynforkort-build') {
            description('Build and deploy mynforkort on new commits')
            triggers {
              scm('H/2 * * * *')
            }
            definition {
              cpsScm {
                scm {
                  git {
                    remote {
                      url('https://github.com/acaburaz/mynforkort')
                      credentials('mynforkort-scm')
                    }
                    branch('*/main')
                  }
                }
                scriptPath('Jenkinsfile')
                lightweight(true)
              }
            }
          }
      - script: |
          pipelineJob('logiplan-api-build') {
            description('Build and deploy logiplan-api on new commits')
            triggers {
              scm('H/2 * * * *')
            }
            definition {
              cps {
                script('''
                  pipeline {
                    agent any
                    environment {
                      IMAGE         = "ghcr.io/acaburaz/logiplan-webapi"
                      APP_NAME      = "logiplan-api"
                      DEPLOY_FILE   = "apps/logiplan-api/deployment.yaml"
                      ARGOCD_SERVER = "argocd-server.argocd.svc.cluster.local"
                      GITOPS_REPO   = "https://github.com/acaburaz/k3s"
                    }
                    stages {
                      stage("Checkout") {
                        steps {
                          checkout([$class: "GitSCM", branches: [[name: "*/master"]], userRemoteConfigs: [[url: "https://dev.azure.com/logiplan/LogiPlanWebApp/_git/LogiPlanWebApp", credentialsId: "logiplan-scm"]]])
                        }
                      }
                      stage("Build & Push Image") {
                        steps {
                          withCredentials([usernamePassword(
                            credentialsId: "ghcr-credentials",
                            usernameVariable: "GHCR_USER",
                            passwordVariable: "GHCR_TOKEN"
                          )]) {
                            sh """
                              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
                              docker build -t ${IMAGE}:${BUILD_NUMBER} -t ${IMAGE}:latest .
                              docker push ${IMAGE}:${BUILD_NUMBER}
                              docker push ${IMAGE}:latest
                            """
                          }
                        }
                      }
                      stage("Update Image Tag in GitOps Repo") {
                        steps {
                          withCredentials([usernamePassword(
                            credentialsId: "github-credentials",
                            usernameVariable: "GH_USER",
                            passwordVariable: "GH_TOKEN"
                          )]) {
                            sh """
                              git clone https://${GH_USER}:${GH_TOKEN}@github.com/acaburaz/k3s.git /tmp/gitops-logiplan-${BUILD_NUMBER}
                              cd /tmp/gitops-logiplan-${BUILD_NUMBER}
                              sed -i "s|image: ghcr.io/acaburaz/logiplan-webapi:.*|image: ghcr.io/acaburaz/logiplan-webapi:${BUILD_NUMBER}|" ${DEPLOY_FILE}
                              git config user.email "jenkins@ci"
                              git config user.name "Jenkins"
                              git add ${DEPLOY_FILE}
                              git commit -m "ci: update logiplan-webapi image to build ${BUILD_NUMBER}" || echo "No changes"
                              git push || true
                              rm -rf /tmp/gitops-logiplan-${BUILD_NUMBER}
                            """
                          }
                        }
                      }
                      stage("Sync ArgoCD") {
                        steps {
                          withCredentials([usernamePassword(
                            credentialsId: "argocd-credentials",
                            usernameVariable: "ARGOCD_USER",
                            passwordVariable: "ARGOCD_PASS"
                          )]) {
                            sh """
                              ARGOCD_TOKEN=\\$(curl -sfk -X POST https://${ARGOCD_SERVER}/api/v1/session \\
                                -H "Content-Type: application/json" \\
                                -d "{\\"username\\":\\"${ARGOCD_USER}\\",\\"password\\":\\"${ARGOCD_PASS}\\"}" | \\
                                grep -o '"token":"[^"]*"' | cut -d'"' -f4)
                              curl -sfk -X POST https://${ARGOCD_SERVER}/api/v1/applications/${APP_NAME}/sync \\
                                -H "Authorization: Bearer \\${ARGOCD_TOKEN}" \\
                                -H "Content-Type: application/json" \\
                                -d "{}"
                            """
                          }
                        }
                      }
                    }
                    post {
                      failure { echo "Build failed for logiplan-api #${BUILD_NUMBER}" }
                      success { echo "Deployed logiplan-webapi:${BUILD_NUMBER}" }
                    }
                  }
                ''')
                sandbox(true)
              }
            }
          }

      - script: |
          pipelineJob('logiplan-terminal-build') {
            description('Build and deploy LogiPlanWebTerminal on new commits')
            triggers {
              scm('H/2 * * * *')
            }
            definition {
              cps {
                script('''
                  pipeline {
                    agent any
                    environment {
                      IMAGE         = "ghcr.io/acaburaz/logiplan-webterminal"
                      APP_NAME      = "logiplan-terminal"
                      DEPLOY_FILE   = "apps/logiplan-terminal/deployment.yaml"
                      ARGOCD_SERVER = "argocd-server.argocd.svc.cluster.local"
                    }
                    stages {
                      stage("Checkout") {
                        steps {
                          checkout([$class: "GitSCM", branches: [[name: "*/master"]], userRemoteConfigs: [[url: "https://dev.azure.com/logiplan/LogiPlanWebApp/_git/LogiPlanWebTerminal", credentialsId: "logiplan-scm"]]])
                        }
                      }
                      stage("Build & Push Image") {
                        steps {
                          withCredentials([usernamePassword(credentialsId: "ghcr-credentials", usernameVariable: "GHCR_USER", passwordVariable: "GHCR_TOKEN")]) {
                            sh """
                              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
                              docker build -t ${IMAGE}:${BUILD_NUMBER} -t ${IMAGE}:latest .
                              docker push ${IMAGE}:${BUILD_NUMBER}
                              docker push ${IMAGE}:latest
                            """
                          }
                        }
                      }
                      stage("Update Image Tag") {
                        steps {
                          withCredentials([usernamePassword(credentialsId: "github-credentials", usernameVariable: "GH_USER", passwordVariable: "GH_TOKEN")]) {
                            sh """
                              git clone https://${GH_USER}:${GH_TOKEN}@github.com/acaburaz/k3s.git /tmp/gitops-terminal-${BUILD_NUMBER}
                              cd /tmp/gitops-terminal-${BUILD_NUMBER}
                              sed -i "s|image: ghcr.io/acaburaz/logiplan-webterminal:.*|image: ghcr.io/acaburaz/logiplan-webterminal:${BUILD_NUMBER}|" ${DEPLOY_FILE}
                              git config user.email "jenkins@ci" && git config user.name "Jenkins"
                              git add ${DEPLOY_FILE}
                              git commit -m "ci: update logiplan-webterminal to build ${BUILD_NUMBER}" || echo "No changes"
                              git push || true
                              rm -rf /tmp/gitops-terminal-${BUILD_NUMBER}
                            """
                          }
                        }
                      }
                      stage("Sync ArgoCD") {
                        steps {
                          withCredentials([usernamePassword(credentialsId: "argocd-credentials", usernameVariable: "ARGOCD_USER", passwordVariable: "ARGOCD_PASS")]) {
                            sh """
                              ARGOCD_TOKEN=\\$(curl -sfk -X POST https://${ARGOCD_SERVER}/api/v1/session -H "Content-Type: application/json" -d "{\\"username\\":\\"${ARGOCD_USER}\\",\\"password\\":\\"${ARGOCD_PASS}\\"}" | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
                              curl -sfk -X POST https://${ARGOCD_SERVER}/api/v1/applications/${APP_NAME}/sync -H "Authorization: Bearer \\${ARGOCD_TOKEN}" -H "Content-Type: application/json" -d "{}"
                            """
                          }
                        }
                      }
                    }
                    post {
                      failure { echo "Build failed for logiplan-terminal #${BUILD_NUMBER}" }
                      success { echo "Deployed logiplan-webterminal:${BUILD_NUMBER}" }
                    }
                  }
                ''')
                sandbox(true)
              }
            }
          }
      - script: |
          pipelineJob('logiplan-ui-build') {
            description('Build and deploy LogiPlanWebUI on new commits')
            triggers {
              scm('H/2 * * * *')
            }
            definition {
              cps {
                script('''
                  pipeline {
                    agent any
                    environment {
                      IMAGE         = "ghcr.io/acaburaz/logiplan-webui"
                      APP_NAME      = "logiplan-ui"
                      DEPLOY_FILE   = "apps/logiplan-ui/deployment.yaml"
                      ARGOCD_SERVER = "argocd-server.argocd.svc.cluster.local"
                    }
                    stages {
                      stage("Checkout") {
                        steps {
                          checkout([$class: "GitSCM", branches: [[name: "*/master"]], userRemoteConfigs: [[url: "https://dev.azure.com/logiplan/LogiPlanWebApp/_git/LogiPlanWebUI", credentialsId: "logiplan-scm"]]])
                        }
                      }
                      stage("Build & Push Image") {
                        steps {
                          withCredentials([usernamePassword(credentialsId: "ghcr-credentials", usernameVariable: "GHCR_USER", passwordVariable: "GHCR_TOKEN")]) {
                            sh """
                              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
                              docker build -t ${IMAGE}:${BUILD_NUMBER} -t ${IMAGE}:latest .
                              docker push ${IMAGE}:${BUILD_NUMBER}
                              docker push ${IMAGE}:latest
                            """
                          }
                        }
                      }
                      stage("Update Image Tag") {
                        steps {
                          withCredentials([usernamePassword(credentialsId: "github-credentials", usernameVariable: "GH_USER", passwordVariable: "GH_TOKEN")]) {
                            sh """
                              git clone https://${GH_USER}:${GH_TOKEN}@github.com/acaburaz/k3s.git /tmp/gitops-ui-${BUILD_NUMBER}
                              cd /tmp/gitops-ui-${BUILD_NUMBER}
                              sed -i "s|image: ghcr.io/acaburaz/logiplan-webui:.*|image: ghcr.io/acaburaz/logiplan-webui:${BUILD_NUMBER}|" ${DEPLOY_FILE}
                              git config user.email "jenkins@ci" && git config user.name "Jenkins"
                              git add ${DEPLOY_FILE}
                              git commit -m "ci: update logiplan-webui to build ${BUILD_NUMBER}" || echo "No changes"
                              git push || true
                              rm -rf /tmp/gitops-ui-${BUILD_NUMBER}
                            """
                          }
                        }
                      }
                      stage("Sync ArgoCD") {
                        steps {
                          withCredentials([usernamePassword(credentialsId: "argocd-credentials", usernameVariable: "ARGOCD_USER", passwordVariable: "ARGOCD_PASS")]) {
                            sh """
                              ARGOCD_TOKEN=\\$(curl -sfk -X POST https://${ARGOCD_SERVER}/api/v1/session -H "Content-Type: application/json" -d "{\\"username\\":\\"${ARGOCD_USER}\\",\\"password\\":\\"${ARGOCD_PASS}\\"}" | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
                              curl -sfk -X POST https://${ARGOCD_SERVER}/api/v1/applications/${APP_NAME}/sync -H "Authorization: Bearer \\${ARGOCD_TOKEN}" -H "Content-Type: application/json" -d "{}"
                            """
                          }
                        }
                      }
                    }
                    post {
                      failure { echo "Build failed for logiplan-ui #${BUILD_NUMBER}" }
                      success { echo "Deployed logiplan-webui:${BUILD_NUMBER}" }
                    }
                  }
                ''')
                sandbox(true)
              }
            }
          }

    unclassified:
      location:
        url: "http://192.168.0.134:32743/"
