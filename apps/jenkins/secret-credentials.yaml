# Jenkins credentials — DO NOT store real values here.
# Apply directly to cluster with:
#
#   sudo kubectl -n jenkins create secret generic jenkins-credentials \
#     --from-literal=GHCR_USER=acaburaz \
#     --from-literal=GHCR_TOKEN=<your-github-pat> \
#     --from-literal=GITHUB_USER=acaburaz \
#     --from-literal=GITHUB_TOKEN=<your-github-pat> \
#     --from-literal=MYNFORKORT_TOKEN=<mynforkort-github-pat> \
#     --from-literal=LOGIPLAN_USER=logiplan \
#     --from-literal=LOGIPLAN_TOKEN=<azure-devops-pat> \
#     --from-literal=ARGOCD_USER=admin \
#     --from-literal=ARGOCD_PASS=<argocd-initial-password> \
#     --dry-run=client -o yaml | sudo kubectl apply -f -
#
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-credentials
  namespace: jenkins
type: Opaque
stringData:
  GHCR_USER: "<CHANGE_ME>"
  GHCR_TOKEN: "<CHANGE_ME>"
  GITHUB_USER: "<CHANGE_ME>"
  GITHUB_TOKEN: "<CHANGE_ME>"
  MYNFORKORT_TOKEN: "<CHANGE_ME>"
  LOGIPLAN_USER: "logiplan"
  LOGIPLAN_TOKEN: "<CHANGE_ME>"
  ARGOCD_USER: "admin"
  ARGOCD_PASS: "<SET_AFTER_ARGOCD_INSTALL>"
